services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: mst-buddy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      # LLM — OpenRouter free model
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
      - key: ROUTER_MODEL
        value: deepseek/deepseek-chat-v3-0324:free

      # Embeddings — Jina AI free tier
      - key: EMBEDDING_PROVIDER
        value: jina
      - key: EMBED_MODEL
        value: jina-embeddings-v2-base-en

      # Secrets — set these in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: CHATBOT_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false          # set to your frontend URL e.g. https://mst-buddy-ui.onrender.com

      # Crawler settings
      - key: CRAWL_ON_STARTUP
        value: "true"
      - key: CRAWL_MAX_PAGES
        value: "60"
      - key: MST_WEBSITE_URLS
        value: "https://mstblockchain.com,https://docs.mstblockchain.com"
      - key: ALLOWED_CRAWL_DOMAINS
        value: "mstblockchain.com,docs.mstblockchain.com"

      # Redis optional — leave empty to disable caching (safe for free tier)
      - key: REDIS_URL
        value: ""

  # ── Frontend Static Site ───────────────────────────────────────────────────
  - type: web
    name: mst-buddy-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set VITE_API_URL to your backend Render URL after backend is deployed
      # e.g. https://mst-buddy-api.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
